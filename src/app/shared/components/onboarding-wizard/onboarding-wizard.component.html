@if (open()) {
  <div class="modal-overlay" role="presentation">
    <div
      appModalHost
      class="modal-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="onboarding-title"
      tabindex="-1"
    >
      <div class="modal-body space-y-3">
        <p class="heading-eyebrow">
          Bienvenida · {{ stepIndex() + 1 }} / {{ totalSteps() }}
        </p>
        <h2 id="onboarding-title" class="heading-h1">{{ currentStep().title }}</h2>
        <p class="text-sm leading-relaxed text-institution-text-primary">
          {{ currentStep().body }}
        </p>
        <div class="flex gap-1 pt-2" aria-hidden="true">
          @for (s of steps(); track $index) {
            <span
              class="h-1.5 w-8 rounded-full"
              [class.bg-ficct-500]="$index <= stepIndex()"
              [class.bg-institution-border]="$index > stepIndex()"
            ></span>
          }
        </div>
      </div>
      <div class="modal-footer">
        <button
          class="btn-ghost btn-sm"
          type="button"
          (click)="skip()"
          [disabled]="busy()"
        >
          Omitir
        </button>
        @if (stepIndex() < totalSteps() - 1) {
          <button class="btn-primary btn-sm" type="button" (click)="next()">
            Siguiente
          </button>
        } @else {
          <button
            class="btn-primary btn-sm"
            type="button"
            (click)="finish()"
            [disabled]="busy()"
          >
            {{ busy() ? "Cargando…" : "Finalizar" }}
          </button>
        }
      </div>
    </div>
  </div>
}
