@if (open()) {
  <div
    class="fixed inset-0 z-40 flex items-center justify-center bg-institution-navy/50 p-4"
    role="dialog"
    aria-modal="true"
  >
    <div class="w-full max-w-lg card">
      <p class="heading-eyebrow">
        Bienvenida · {{ stepIndex() + 1 }} / {{ totalSteps() }}
      </p>
      <h2 class="mt-2 heading-h1">{{ currentStep().title }}</h2>
      <p class="mt-3 text-sm text-institution-text-primary">
        {{ currentStep().body }}
      </p>

      <div class="mt-6 flex items-center justify-between">
        <div class="flex gap-1">
          @for (s of steps(); track $index) {
            <span
              class="h-1.5 w-8 rounded-full"
              [class.bg-ficct-500]="$index <= stepIndex()"
              [class.bg-institution-border]="$index > stepIndex()"
            ></span>
          }
        </div>
        <div class="flex gap-2">
          <button
            class="btn-ghost btn-sm"
            type="button"
            (click)="skip()"
            [disabled]="busy()"
          >
            Omitir
          </button>
          @if (stepIndex() < totalSteps() - 1) {
            <button class="btn-primary btn-sm" type="button" (click)="next()">
              Siguiente
            </button>
          } @else {
            <button
              class="btn-primary btn-sm"
              type="button"
              (click)="finish()"
              [disabled]="busy()"
            >
              {{ busy() ? "Cargando…" : "Finalizar" }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
}
