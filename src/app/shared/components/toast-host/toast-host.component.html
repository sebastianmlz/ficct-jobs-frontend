@if (items().length) {
  <div
    class="toast-host pointer-events-none fixed inset-x-3 z-50 mx-auto flex w-auto max-w-sm flex-col gap-2 sm:inset-x-auto sm:right-4"
    role="status"
    aria-live="polite"
  >
    @for (m of items(); track m.id) {
      <div
        class="pointer-events-auto card border-l-4 shadow-card-hover"
        [class]="border(m.kind)"
      >
        <div class="flex items-start justify-between gap-3">
          <div>
            <p
              class="text-xs font-semibold uppercase tracking-widest"
              [class]="text(m.kind)"
            >
              {{ m.kind }}
            </p>
            <p class="mt-1 text-sm font-medium text-institution-text-primary">
              {{ m.title }}
            </p>
            @if (m.description) {
              <p class="mt-1 text-xs text-muted">{{ m.description }}</p>
            }
          </div>
          <button
            class="text-xs text-muted hover:text-institution-text-primary"
            type="button"
            (click)="dismiss(m.id)"
          >
            ×
          </button>
        </div>
      </div>
    }
  </div>
}
