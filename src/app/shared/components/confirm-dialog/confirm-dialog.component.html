@if (open()) {
  <div
    class="modal-overlay"
    role="presentation"
    (mousedown)="cancel()"
  >
    <div
      appModalHost
      class="modal-panel"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'confirm-dialog-title'"
      tabindex="-1"
      (mousedown)="$event.stopPropagation()"
    >
      <div class="modal-body space-y-2">
        <h3 id="confirm-dialog-title" class="heading-h2 text-institution-text-primary">
          {{ title }}
        </h3>
        @if (description) {
          <p class="text-sm text-muted">{{ description }}</p>
        }
        <ng-content></ng-content>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary btn-sm" type="button" (click)="cancel()">
          {{ cancelLabel }}
        </button>
        <button
          class="btn-sm"
          [class.btn-danger]="destructive"
          [class.btn-primary]="!destructive"
          type="button"
          (click)="confirm()"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
