@if (open()) {
  <div class="fixed inset-0 z-40 flex items-center justify-center bg-institution-navy/40 p-4" role="dialog" aria-modal="true">
    <div class="w-full max-w-md card">
      <h3 class="heading-h2 text-institution-text-primary">{{ title }}</h3>
      @if (description) {
        <p class="mt-2 text-sm text-muted">{{ description }}</p>
      }
      <ng-content></ng-content>
      <div class="mt-6 flex justify-end gap-2">
        <button class="btn-secondary btn-sm" type="button" (click)="cancel()">{{ cancelLabel }}</button>
        <button class="btn-sm" [class.btn-danger]="destructive" [class.btn-primary]="!destructive" type="button" (click)="confirm()">
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
