<div class="flex min-h-screen flex-col bg-institution-surface">
  <header class="sticky top-0 z-40 border-b border-institution-border bg-white">
    <div class="container-page flex h-14 items-center justify-between gap-4">
      <a
        class="flex shrink-0 items-center gap-2.5"
        routerLink="/dashboard"
        aria-label="Panel FICCT Jobs"
      >
        <span
          class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-ficct-500 font-display text-xs font-bold text-white"
          >FJ</span
        >
        <div class="hidden flex-col leading-none sm:flex">
          <span
            class="font-display text-sm font-bold tracking-tight text-institution-navy"
            >FICCT Jobs</span
          >
          <span
            class="text-[9px] font-semibold uppercase tracking-[0.13em] text-institution-text-secondary"
            >UAGRM</span
          >
        </div>
      </a>

      <nav
        class="hidden min-w-0 flex-1 items-center gap-0.5 overflow-x-auto md:flex"
        aria-label="Navegación principal"
      >
        @for (item of nav(); track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="nav-link-active"
            [routerLinkActiveOptions]="{ exact: false }"
            class="nav-link shrink-0"
          >
            <app-icon [name]="item.icon" size="h-3.5 w-3.5" />
            <span class="whitespace-nowrap">{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="flex items-center gap-1">
        <a
          [routerLink]="['/notifications']"
          routerLinkActive="bg-ficct-50 text-ficct-600"
          class="hidden rounded-md p-2 text-institution-text-secondary transition-all hover:bg-institution-surface hover:text-institution-text-primary sm:inline-flex"
          aria-label="Notificaciones"
          title="Notificaciones"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            />
          </svg>
        </a>

        <a
          [routerLink]="['/settings']"
          routerLinkActive="bg-ficct-50 text-ficct-600"
          class="hidden rounded-md p-2 text-institution-text-secondary transition-all hover:bg-institution-surface hover:text-institution-text-primary sm:inline-flex"
          aria-label="Ajustes"
          title="Ajustes"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </a>

        <span
          class="mx-1 hidden h-4 w-px bg-institution-border sm:block"
        ></span>

        <div class="hidden items-center gap-2 sm:flex">
          <div
            class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-ficct-100 text-[11px] font-bold text-ficct-700"
          >
            {{ userInitials() }}
          </div>
          <span
            class="max-w-[120px] truncate text-xs text-institution-text-secondary"
            >{{ user()?.email }}</span
          >
          <button
            class="inline-flex items-center gap-1 rounded-md px-2 py-1 text-xs font-medium text-institution-text-secondary transition hover:bg-institution-surface hover:text-institution-text-primary"
            type="button"
            (click)="logout()"
          >
            <svg
              class="h-3.5 w-3.5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" class="flex-1">
    <div class="container-page pb-app-shell pt-6 sm:pt-8 md:pt-10">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="border-t border-institution-border bg-white">
    <div
      class="container-page flex items-center justify-between py-4 text-xs text-institution-text-secondary"
    >
      <span>FICCT-UAGRM · Plataforma institucional de vinculación laboral</span>
      <span
        class="font-semibold uppercase tracking-[0.12em] text-institution-navy"
        >FICCT-UAGRM</span
      >
    </div>
  </footer>

  <nav class="nav-bottom" aria-label="Navegación móvil">
    <div class="flex w-full overflow-x-auto">
      @for (item of nav(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="text-ficct-600 bg-ficct-50"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-bottom-item"
        >
          <app-icon [name]="item.icon" size="h-5 w-5" />
          <span class="text-[9px] font-medium leading-none">{{
            item.label
          }}</span>
        </a>
      }
    </div>
  </nav>

  <app-onboarding-wizard></app-onboarding-wizard>
</div>
