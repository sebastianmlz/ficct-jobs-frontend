<div
  class="flex min-h-screen items-center justify-center bg-institution-surface px-4 py-12"
>
  <div class="w-full max-w-[400px]">
    <a class="mb-8 flex items-center gap-2" routerLink="/">
      <span
        class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-ficct-500 font-display text-xs font-bold text-white"
        >FJ</span
      >
      <span class="font-display text-sm font-bold text-institution-navy"
        >FICCT Jobs</span
      >
    </a>

    <div class="card">
      <div
        class="mb-5 flex h-10 w-10 items-center justify-center rounded-full bg-ficct-50"
      >
        <svg
          class="h-5 w-5 text-ficct-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
          />
        </svg>
      </div>
      <h1 class="heading-h1 text-xl">Recuperar acceso</h1>
      <p class="mt-1 text-sm text-institution-text-secondary">
        Le enviaremos un enlace de restablecimiento válido por una hora.
      </p>

      @if (sent()) {
        <div class="mt-6 alert-success flex items-start gap-3">
          <svg
            class="mt-0.5 h-4 w-4 shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <span
            >Si el correo existe en el sistema, se envió un enlace de
            restablecimiento.</span
          >
        </div>
      } @else {
        <form
          class="mt-6 space-y-4"
          [formGroup]="form"
          (ngSubmit)="submit()"
          novalidate
        >
          <div>
            <label class="label-base" for="forgot-email"
              >Correo electrónico</label
            >
            <input
              id="forgot-email"
              type="email"
              autocomplete="email"
              class="input-base"
              formControlName="email"
              placeholder="tu@correo.edu.bo"
            />
          </div>
          <button
            class="btn-primary w-full"
            type="submit"
            [disabled]="busy() || form.invalid"
          >
            @if (busy()) {
              <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                />
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                />
              </svg>
            }
            {{ busy() ? "Enviando…" : "Enviar enlace" }}
          </button>
        </form>
      }

      <p class="mt-6 text-center text-sm text-institution-text-secondary">
        <a
          class="font-semibold text-ficct-600 hover:text-ficct-700"
          routerLink="/auth/login"
        >
          ← Iniciar sesión
        </a>
      </p>
    </div>
  </div>
</div>
