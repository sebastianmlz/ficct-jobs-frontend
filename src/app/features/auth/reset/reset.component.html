<div class="flex min-h-screen items-center justify-center bg-institution-surface px-4 py-12">
  <div class="w-full max-w-[400px]">

    <a class="mb-8 flex items-center gap-2" routerLink="/">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-md bg-ficct-500 font-display text-xs font-bold text-white">FJ</span>
      <span class="font-display text-sm font-bold text-institution-navy">FICCT Jobs</span>
    </a>

    <div class="card">
      <div class="mb-5 flex h-10 w-10 items-center justify-center rounded-full bg-ficct-50">
        <svg class="h-5 w-5 text-ficct-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="heading-h1 text-xl">Establezca una nueva contraseña</h1>
      <p class="mt-1 text-sm text-institution-text-secondary">Use una contraseña segura que no utilice en otros sitios.</p>

      @if (!token) {
        <div class="mt-6 alert-danger flex items-start gap-2">
          <svg class="mt-0.5 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          El enlace no incluye un código válido. Solicite un nuevo correo de restablecimiento.
        </div>
      } @else {
        <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()" novalidate>
          <div>
            <label class="label-base" for="reset-password">Nueva contraseña</label>
            <input
              id="reset-password"
              type="password"
              autocomplete="new-password"
              class="input-base"
              formControlName="new_password"
            />
          </div>
          @if (errorMessage()) {
            <div class="alert-danger flex items-start gap-2">
              <svg class="mt-0.5 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              {{ errorMessage() }}
            </div>
          }
          <button class="btn-primary w-full" type="submit" [disabled]="busy() || form.invalid">
            @if (busy()) {
              <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            }
            {{ busy() ? 'Actualizando…' : 'Actualizar contraseña' }}
          </button>
        </form>
      }

      <p class="mt-6 text-center text-sm text-institution-text-secondary">
        <a class="font-semibold text-ficct-600 hover:text-ficct-700" routerLink="/auth/login">
          ← Iniciar sesión
        </a>
      </p>
    </div>

  </div>
</div>
