# Bench-only nginx config. Mirrors the production nginx/default.conf but
# adds a reverse proxy to the local backend bench on host.docker.internal:58000
# so that the SPA's relative /api/v1 calls reach the isolated backend.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Match the prod nginx fixes (gzip + no-cache on index.html).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # Long cache for hashed assets (matches prod nginx).
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Forward /api/v1/* to the local backend bench, so the SPA hitting the
    # production-build base path /api/v1 lands in the isolated Django bench
    # container. No prod backend is ever called.
    location /api/v1/ {
        proxy_pass http://host.docker.internal:58000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
